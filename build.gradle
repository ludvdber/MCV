plugins {
	id 'java'
	id 'org.springframework.boot' version '4.0.3'
	id 'io.spring.dependency-management' version '1.1.7'
}

group = 'com.mars'
version = '0.0.1-SNAPSHOT'
description = 'Mars Atmospheric Data Visualizer'

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(21)
	}
}

configurations {
	compileOnly {
		extendsFrom annotationProcessor
	}
}

repositories {
	mavenCentral()
	// Repository UCAR pour NetCDF-Java
	maven {
		url = 'https://artifacts.unidata.ucar.edu/repository/unidata-all/'
	}
}

dependencies {
	// Spring Boot starters
	implementation 'org.springframework.boot:spring-boot-starter-web'
	// NetCDF library (UCAR) - 5.9.1 = dernière stable et fonctionnelle
	implementation 'edu.ucar:cdm-core:5.9.1'

	// Guava - requis par cdm-core 5.9.1
	implementation 'com.google.guava:guava:33.5.0-jre'
	
	// Lombok
	compileOnly 'org.projectlombok:lombok'
	annotationProcessor 'org.projectlombok:lombok'
	
	// DevTools (rechargement automatique)
	developmentOnly 'org.springframework.boot:spring-boot-devtools'
	
	// Tests
	testImplementation 'org.springframework.boot:spring-boot-starter-test'
	testImplementation 'org.springframework.boot:spring-boot-starter-webmvc-test'
	testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

tasks.named('test') {
	useJUnitPlatform()
}

// Compilation avec flag -parameters pour Spring Boot
tasks.withType(JavaCompile) {
    options.compilerArgs << '-parameters'
}