plugins {
	id 'java'
	id 'org.springframework.boot' version '4.1.0'
	id 'io.spring.dependency-management' version '1.1.7'
}

group = 'com.mars'
version = '0.0.1-SNAPSHOT'
description = 'Mars Climate Viewer'

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(21)
	}
}

configurations {
	compileOnly {
		extendsFrom annotationProcessor
	}
}

repositories {
	mavenCentral()
	// Repository UCAR pour NetCDF-Java
	maven {
		url = 'https://artifacts.unidata.ucar.edu/repository/unidata-all/'
	}
}

dependencies {
	// Spring Boot starters
	implementation 'org.springframework.boot:spring-boot-starter-web'
	// NetCDF library (UCAR) - 5.9.1 = dernière stable et fonctionnelle
	implementation 'edu.ucar:cdm-core:5.9.1'

	// Guava - requis par cdm-core 5.9.1
	implementation 'com.google.guava:guava:33.6.0-jre'

	// OpenAPI / Swagger UI — auto-generated API documentation
	implementation 'org.springdoc:springdoc-openapi-starter-webmvc-ui:3.0.3'
	
	// Lombok
	compileOnly 'org.projectlombok:lombok'
	annotationProcessor 'org.projectlombok:lombok'
	
	// DevTools (rechargement automatique)
	developmentOnly 'org.springframework.boot:spring-boot-devtools'
	
	// Tests
	testImplementation 'org.springframework.boot:spring-boot-starter-test'
	testImplementation 'org.springframework.boot:spring-boot-starter-webmvc-test'
	testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

tasks.named('test') {
	useJUnitPlatform()
	jvmArgs '-XX:+EnableDynamicAgentLoading'
}

tasks.named('jar') {
	enabled = false
}

// ── Frontend build ──────────────────────────────────────────────────────
def isWindows = System.getProperty('os.name').toLowerCase().contains('windows')
def npmCmd = isWindows ? 'npm.cmd' : 'npm'

tasks.register('npmInstall', Exec) {
	workingDir = file('frontend')
	commandLine npmCmd, 'install'
	inputs.file('frontend/package-lock.json')
	outputs.dir('frontend/node_modules')
}

tasks.register('buildFrontend', Exec) {
	dependsOn 'npmInstall'
	workingDir = file('frontend')
	commandLine npmCmd, 'run', 'build'
	inputs.dir('frontend/src')
	inputs.dir('frontend/public')
	inputs.file('frontend/index.html')
	inputs.file('frontend/vite.config.js')
	outputs.dir('frontend/dist')
}

tasks.register('copyFrontend', Copy) {
	dependsOn 'buildFrontend'
	from 'frontend/dist'
	into 'build/resources/main/static'
}

tasks.named('classes') {
	dependsOn 'copyFrontend'
}

// Compilation avec flag -parameters pour Spring Boot
tasks.withType(JavaCompile) {
    options.compilerArgs << '-parameters'
}