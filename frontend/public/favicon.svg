<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="g" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#ff8a65"/>
      <stop offset="45%" stop-color="#e05a2b"/>
      <stop offset="100%" stop-color="#8b2500"/>
    </radialGradient>
    <radialGradient id="h" cx="28%" cy="25%" r="30%">
      <stop offset="0%" stop-color="rgba(255,200,160,0.5)"/>
      <stop offset="100%" stop-color="rgba(255,200,160,0)"/>
    </radialGradient>
    <clipPath id="c"><circle cx="32" cy="32" r="28"/></clipPath>
  </defs>
  <!-- Planet -->
  <circle cx="32" cy="32" r="28" fill="url(#g)"/>
  <!-- Surface features -->
  <g clip-path="url(#c)" opacity="0.35">
    <ellipse cx="22" cy="25" rx="8" ry="5" fill="#8b2500" transform="rotate(-15 22 25)"/>
    <ellipse cx="44" cy="35" rx="9" ry="4" fill="#8b2500" transform="rotate(10 44 35)"/>
    <circle cx="16" cy="40" r="4" fill="#7a1f00"/>
    <circle cx="38" cy="19" r="2.8" fill="#7a1f00"/>
    <circle cx="47" cy="47" r="3" fill="#7a1f00"/>
    <!-- Polar cap -->
    <ellipse cx="32" cy="7" rx="15" ry="5" fill="rgba(255,255,255,0.35)"/>
  </g>
  <!-- Specular highlight -->
  <circle cx="32" cy="32" r="28" fill="url(#h)"/>
  <!-- Orbital ring -->
  <ellipse cx="32" cy="32" rx="31" ry="9.5" fill="none"
    stroke="rgba(0,188,212,0.45)" stroke-width="1.1"
    transform="rotate(-20 32 32)"/>
</svg>
