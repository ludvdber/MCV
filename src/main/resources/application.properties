spring.application.name=mars-visualizer
app.version=3.0

# Chemin des fichiers NetCDF MEAN (override via env NETCDF_MEAN_PATH)
netcdf.mean.path=${NETCDF_MEAN_PATH:C:/Users/User/Desktop/mars-data/mean}

# Chemin des fichiers NetCDF individuels (override via env NETCDF_INDIVIDUAL_PATH)
netcdf.individual.path=${NETCDF_INDIVIDUAL_PATH:C:/Users/User/Desktop/mars-data/individual}

# Premier MY connu dans le dossier individual/
# (les annees suivantes sont detectees automatiquement par scan)
netcdf.individual.my_base=34

# Port du serveur
server.port=8080

# Logs compact
spring.main.banner-mode=off
logging.pattern.console=%d{HH:mm:ss.SSS} %5p [%15.15t] %-40.40logger{39} : %m%n
logging.level.com.mars.visualizer=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.boot=WARN
logging.level.org.apache.catalina=WARN
logging.level.org.apache.coyote.http11.Http11Processor=ERROR

# Virtual threads (Project Loom, Java 21)
spring.threads.virtual.enabled=true

# Compression Gzip des reponses HTTP (JSON, CSV, HTML)
server.compression.enabled=true
server.compression.min-response-size=1024
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,text/css,text/csv,application/javascript

# Arret gracieux (attend la fin des requetes en cours avant d'arreter)
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# Timeout de connexion Tomcat
server.tomcat.connection-timeout=10s

# Trust reverse proxy headers (X-Forwarded-Proto, X-Forwarded-Host)
# Required for Swagger UI to generate correct HTTPS URLs behind Nginx/Caddy
server.forward-headers-strategy=framework

# Rate limiting (requetes API par minute par IP)
ratelimit.requests-per-minute=120
ratelimit.export-per-minute=20

# OpenAPI / Swagger UI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.filter=true

# DevTools : actif automatiquement en dev si la dependance est presente.
# En production (JAR), spring-boot-devtools est exclu du classpath.