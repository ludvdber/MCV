spring.application.name=mars-visualizer
app.version=3.0

# Chemin des fichiers NetCDF MEAN
netcdf.mean.path=C:/Users/User/Desktop/mars-data/mean

# Chemin des fichiers NetCDF individuels
netcdf.individual.path=C:/Users/User/Desktop/mars-data/individual

# Premier MY connu dans le dossier individual/
# (les annees suivantes sont detectees automatiquement par scan)
netcdf.individual.my_base=34

# Port du serveur
server.port=8080

# Logs compact
spring.main.banner-mode=off
logging.pattern.console=%d{HH:mm:ss.SSS} %5p [%15.15t] %-40.40logger{39} : %m%n
logging.level.com.mars.visualizer=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.boot=WARN
logging.level.org.apache.catalina=WARN

# Virtual threads (Project Loom, Java 21)
spring.threads.virtual.enabled=true

# Compression Gzip des reponses HTTP (JSON, CSV, HTML)
server.compression.enabled=true
server.compression.min-response-size=1024
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,text/css,text/csv,application/javascript

# Arret gracieux (attend la fin des requetes en cours avant d'arreter)
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# Timeout de connexion Tomcat
server.tomcat.connection-timeout=10s

# DevTools (rechargement automatique)
spring.devtools.restart.enabled=true