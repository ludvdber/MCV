# =============================================================================
# English messages (default fallback)
# =============================================================================

# Error categories (used in response "error" field)
error.category.netcdf=NetCDF read error
error.category.validation=Invalid parameter
error.category.internal=Internal server error
error.generic=An unexpected error occurred.

# Validation
error.timestep.invalid=Invalid time index: {0}. Expected value between {1} and {2}.
error.altitude.invalid=Invalid altitude index: {0}. Expected value between {1} and {2}.
error.variable.empty=Variable name cannot be empty.
error.variable.not.found=Variable not found: ''{0}''. Available variables: {1}.
error.latitude.invalid=Invalid latitude: {0}. Expected value between -90 and 90 degrees.
error.longitude.invalid=Invalid longitude: {0}. Expected value between -180 and 180 degrees.

# Individual datasets
error.individual.timeseries=Time series is not available for individual files (single time step per file).
error.individual.animation=Diurnal animation is not available for individual files (single time step per file).
error.individual.export.timeseries=Time series export is not available for individual files (single time step per file).
error.individual.year.not.available=Martian year MY{0} not available in individual files.
error.individual.dir.not.found=No directory found for MY{0} Ls {1}.
error.individual.file.not.found=No individual file found for MY{0} Ls {1}.
error.individual.dir.read=Error reading directory {0}: {1}
error.individual.ls.parse=Ls not found in filename: {0}

# Datasets
error.dataset.not.found=Dataset not found: ''{0}''
error.dataset.individual.format=Invalid individual dataset format: ''{0}''. Expected: IND_MY'{'nn'}'_LS'{'dd.dd'}'

