error.netcdf.read.slice=Error reading 2D slice in ''{0}''
error.netcdf.read.timeseries=Error reading time series in ''{0}''
error.netcdf.read.animation=Error reading animation frames in ''{0}''
error.netcdf.read.profile=Error reading vertical profile in ''{0}''
error.netcdf.read.crosssection=Error reading cross-section in ''{0}''
error.netcdf.read.wind=Error reading wind field in ''{0}''
error.netcdf.read.altitude=Error reading altitude in ''{0}''
error.netcdf.read.section=I/O error reading NetCDF section [{0}]
